<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <!--
      GitHub Pages 404 redirect restoration.
      Priority:
      1. ?origin=... (our custom ?origin=... pattern)
         → decode the stored URL, extract its pathname, navigate via React Router to the
           correct route (e.g. /blog/post/nonexistent → PostPage)
           Giscus reads from useLocation() which has the correct pathname.
      2. ?/path?query                       (legacy rafgraph/spa-github-pages pattern, MIT)
         → restore via history.replaceState
    -->
    <script>
      ;(function (l) {
        var search = l.search
        // 1. Our ?origin=... pattern: full URL encoded as origin param
        if (search.indexOf('origin=') !== -1) {
          var match = search.match(/[?&]origin=([^&]+)/)
          if (match) {
            try {
              var decoded = decodeURIComponent(match[1])
              // Parse as URL so we can extract just the pathname regardless of the
              // current base path (handles both root-site and project-site repos).
              var u = new URL(decoded)
              sessionStorage.setItem('__spa_origin__', u.pathname + u.search + u.hash)
            } catch (e) {}
          }
          return
        }
        // 2. Legacy ?/path pattern (rafgraph/spa-github-pages, MIT)
        if (search.length > 1 && search.charAt(1) === '/') {
          var decoded = search
            .slice(1)
            .split('&')
            .map(function (s) { return s.replace(/~and~/g, '&') })
            .join('?')
          var base = l.pathname.endsWith('/') ? l.pathname.slice(0, -1) : l.pathname
          window.history.replaceState(null, null, base + decoded + l.hash)
        }
      })(window.location)
    </script>
    <meta name="color-scheme" content="light dark" />
    <script>
      ;(function () {
        function readPreference() {
          try {
            var next = localStorage.getItem('BLOG-theme-preference')
            if (next === 'system' || next === 'light' || next === 'dark') {
              return next
            }
            var legacy = localStorage.getItem('BLOG-theme')
            if (legacy === 'light' || legacy === 'dark') {
              return legacy
            }
          } catch (e) {}
          return 'system'
        }
        function effectiveTheme() {
          var pref = readPreference()
          if (pref === 'light' || pref === 'dark') {
            return pref
          }
          if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            return 'dark'
          }
          return 'light'
        }
        document.documentElement.dataset.theme = effectiveTheme()
      })()
    </script>
    <!-- Defaults mirror `config.json` → `icons`; SeoHead syncs from config after load. -->
    <link rel="icon" type="image/png" href="%BASE_URL%avatar.png" />
    <link rel="apple-touch-icon" type="image/png" href="%BASE_URL%avatar.png" />
    <meta name="msapplication-TileColor" content="#863bff" />
    <meta name="theme-color" content="#863bff" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coldairboy&apos;s BLOG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,500&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700;1,9..144,500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
